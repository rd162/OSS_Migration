# New: no PHP equivalent — production Docker Compose stack.
# Phase 6 B4: all 3 service roles from the same image + nginx (R05, R06, R07, R20).
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Build the image: docker build -t ttrss-python:latest .
#   2. Copy .env.production.example → .env.production and fill in secrets
#   3. Copy .env.db.example → .env.db and fill in Postgres credentials

x-common: &common
  image: ttrss-python:latest
  env_file: .env.production
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  web:
    <<: *common
    command: ["gunicorn", "--config", "gunicorn.conf.py", "ttrss:create_app()"]
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    <<: *common
    command:
      - celery
      - -A
      - ttrss.celery_app
      - worker
      - --pool=prefork
      - --concurrency=4
      - --loglevel=info
      - --hostname=celery@%h
    healthcheck:
      # R07: bare inspect ping — exit code is authoritative; no grep pipeline
      test: ["CMD", "celery", "inspect", "ping", "--destination", "celery@$HOSTNAME"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  beat:
    <<: *common
    command:
      - celery
      - -A
      - ttrss.celery_app
      - beat
      - --loglevel=info
      - --scheduler=celery.beat:PersistentScheduler
      - --schedule=/tmp/celerybeat-schedule

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    env_file: .env.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
