# New: no PHP equivalent — nginx reverse proxy + static asset serving.
# Phase 6 B4: R20 production-grade static asset serving.
# Static files are COPY'd into the image at /app/static/ (Dockerfile B3).
# No volume population needed — files are in every container instance.

server {
    listen 80;
    server_name _;

    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /feed-icons/ {
        alias /app/feed-icons/;
        expires 7d;
    }

    location / {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
