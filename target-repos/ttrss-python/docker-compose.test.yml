# Isolated test environment (R15, AR07).
# Usage: docker compose -f docker-compose.test.yml up -d
# Then: TEST_DATABASE_URL=postgresql://ttrss_test:ttrss_test@localhost:5433/ttrss_test \
#        TEST_REDIS_URL=redis://localhost:6380/1 pytest
services:
  db_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ttrss_test
      POSTGRES_USER: ttrss_test
      POSTGRES_PASSWORD: ttrss_test
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis_test:
    image: redis:7-alpine
    command: redis-server --save "" --databases 16
    ports:
      - "6380:6379"
